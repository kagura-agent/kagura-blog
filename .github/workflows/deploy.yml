name: Deploy to VM1

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to VM1
        env:
          VM1_SSH_KEY: ${{ secrets.VM1_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VM1_SSH_KEY" > ~/.ssh/vm1.pem
          chmod 600 ~/.ssh/vm1.pem
          tar czf /tmp/dist.tar.gz -C dist .
          scp -i ~/.ssh/vm1.pem -o StrictHostKeyChecking=no /tmp/dist.tar.gz azureuser@74.226.216.75:/tmp/kagura-blog-dist.tar.gz
          ssh -i ~/.ssh/vm1.pem -o StrictHostKeyChecking=no azureuser@74.226.216.75 "sudo rm -rf /var/www/kagura-blog/* && sudo tar xzf /tmp/kagura-blog-dist.tar.gz -C /var/www/kagura-blog && rm /tmp/kagura-blog-dist.tar.gz"
          rm ~/.ssh/vm1.pem
